<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Godolkin | Automation that actually ships</title>
    <meta
      name="description"
      content="See it work before you hire me. Real automations for lead handling, reporting, and decision pipelines, running live in your browser."
    />
    <meta name="theme-color" content="#0a0f16" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- TODO(blenard): after deploying, replace https://godolkin.example with the
         real domain (or the Vercel/Netlify URL) in the canonical + og:url +
         og:image + twitter:image tags below. Scrapers need absolute URLs. -->
    <link rel="canonical" href="https://godolkin.example/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Godolkin" />
    <meta property="og:title" content="Godolkin | Automation that actually ships" />
    <meta
      property="og:description"
      content="See it work before you hire me. Real automations for lead handling, reporting, and decision pipelines, running live in your browser."
    />
    <meta property="og:url" content="https://godolkin.example/" />
    <meta property="og:image" content="https://godolkin.example/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="it_IT" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Godolkin | Automation that actually ships" />
    <meta
      name="twitter:description"
      content="See it work before you hire me. Real automations running live in your browser."
    />
    <meta name="twitter:image" content="https://godolkin.example/og.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Analytics: cookieless options, pick ONE and uncomment when ready.
         TODO(blenard): choose after deploying.

         Option 1, Plausible (paid, EU-hosted; set data-domain to your domain):
         <script defer data-domain="godolkin.example" src="https://plausible.io/js/script.js"></script>

         Option 2, Vercel Web Analytics (free tier; first enable it for the
         project in the Vercel dashboard, then uncomment):
         <script defer src="/_vercel/insights/script.js"></script>
    -->

    <style>
      html { background: #0a0f16; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
